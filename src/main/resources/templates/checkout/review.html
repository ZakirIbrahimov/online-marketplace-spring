<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkout</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>Checkout</h1>
    <p th:if="${cart == null || cart.items.isEmpty()}" class="meta">Nothing to checkout. <a th:href="@{/cart}">View cart</a></p>
    <table class="data" th:if="${cart != null && !cart.items.isEmpty()}">
        <tr th:each="line : ${cart.items}">
            <td th:text="${line.product.title}"></td>
            <td th:text="${line.quantity}"></td>
            <td th:text="${#numbers.formatDecimal(line.product.price * line.quantity,1,2)}"></td>
        </tr>
    </table>
    <form th:if="${cart != null && !cart.items.isEmpty()}" th:action="@{/checkout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <p class="meta">Single-seller carts only. Payment is mocked (no real charge).</p>
        <button type="submit">Place order</button>
    </form>
</main>
</body>
</html>
