<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="nav">
    <nav class="site">
        <a class="brand" th:href="@{/}">Marketplace</a>
        <a th:href="@{/products}">Products</a>
        <span class="sep" sec:authorize="isAuthenticated()">|</span>
        <a sec:authorize="hasRole('SHOPPER')" th:href="@{/cart}">Cart</a>
        <a sec:authorize="hasRole('SHOPPER')" th:href="@{/orders}">My orders</a>
        <a sec:authorize="hasRole('MERCHANT')" th:href="@{/merchant}">Seller</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>
        <span class="sep" sec:authorize="!isAuthenticated()">|</span>
        <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Sign in</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/register}">Register</a>
        <span class="sep" sec:authorize="isAuthenticated()">|</span>
        <span sec:authorize="isAuthenticated()" class="meta" sec:authentication="name"></span>
        <form sec:authorize="isAuthenticated()" class="inline-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="secondary">Sign out</button>
        </form>
    </nav>
</th:block>

<th:block th:fragment="flash">
    <div class="flash error" th:if="${error}" th:text="${error}"></div>
    <div class="flash ok" th:if="${message}" th:text="${message}"></div>
</th:block>
</body>
</html>
