<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>New product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>New product</h1>
    <p class="meta">New listings require admin approval before they appear in the catalog.</p>
    <form class="stacked" th:action="@{/merchant/products}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Title <input type="text" name="title" required/></label>
        <label>Description <textarea name="description" rows="4"></textarea></label>
        <label>Price <input type="number" name="price" step="0.01" min="0" required/></label>
        <label>Stock <input type="number" name="stock" min="0" required/></label>
        <label>Images (max 5) <input type="file" name="images" multiple accept="image/*"/></label>
        <button type="submit">Save</button>
    </form>
</main>
</body>
</html>
