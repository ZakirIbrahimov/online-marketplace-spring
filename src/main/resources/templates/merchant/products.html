<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My products</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>Products</h1>
    <p><a class="btn" th:href="@{/merchant/products/new}">New product</a></p>
    <table class="data">
        <thead>
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Stock</th>
            <th>Price</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.title}"></td>
            <td><span class="pill" th:text="${p.listingStatus}"></span></td>
            <td th:text="${p.stock}"></td>
            <td th:text="${#numbers.formatDecimal(p.price,1,2)}"></td>
            <td>
                <a th:href="@{/merchant/products/{id}/edit(id=${p.id})}">Edit</a>
                <form class="inline-form" th:action="@{/merchant/products/{id}/delete(id=${p.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
