<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>Welcome</h1>
    <p class="meta">Browse products, checkout with mock payment, and track orders. Merchants list inventory after admin approval.</p>
    <p><a class="btn" th:href="@{/products}">Browse products</a></p>
    <p sec:authorize="hasRole('ADMIN')" class="meta">Dev: <code>admin@marketplace.local</code> / <code>admin123</code></p>
</main>
</body>
</html>
