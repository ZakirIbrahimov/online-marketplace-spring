<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sign in</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>Sign in</h1>
    <div class="flash error" th:if="${param.error}">Invalid email or password.</div>
    <div class="flash ok" th:if="${param.logout}">You have been signed out.</div>
    <form class="stacked" th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Email
            <input type="email" name="username" required autocomplete="username"/>
        </label>
        <label>Password
            <input type="password" name="password" required autocomplete="current-password"/>
        </label>
        <button type="submit">Sign in</button>
    </form>
    <p class="meta"><a th:href="@{/register}">Create an account</a></p>
</main>
</body>
</html>
