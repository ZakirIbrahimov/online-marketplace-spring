<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>Admin dashboard</h1>
    <div class="stats">
        <div class="stat">Users <strong th:text="${metrics.userCount}">0</strong></div>
        <div class="stat">Orders <strong th:text="${metrics.orderCount}">0</strong></div>
        <div class="stat">Revenue <strong th:text="${#numbers.formatDecimal(metrics.revenue,1,2)}">0</strong></div>
        <div class="stat">Pending merchants <strong th:text="${metrics.pendingMerchants}">0</strong></div>
        <div class="stat">Pending products <strong th:text="${metrics.pendingProducts}">0</strong></div>
    </div>
    <p style="margin-top:1.5rem;">
        <a class="btn" th:href="@{/admin/merchants/pending}">Review merchants</a>
        <a class="btn secondary" th:href="@{/admin/products}">All products</a>
        <a class="btn secondary" th:href="@{/admin/orders}">All orders</a>
        <a class="btn secondary" th:href="@{/admin/disputes}">Disputes</a>
        <a class="btn secondary" th:href="@{/admin/users}">Users</a>
    </p>
</main>
</body>
</html>
