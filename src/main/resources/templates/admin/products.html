<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>All products</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>All products</h1>
    <table class="data">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Merchant</th>
            <th>Status</th>
            <th>Moderation</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${page.content}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.title}"></td>
            <td th:text="${p.merchant.email}"></td>
            <td><span class="pill" th:text="${p.listingStatus}"></span></td>
            <td>
                <form class="inline-form" th:action="@{/admin/products/{id}/listing(id=${p.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <select name="status">
                        <option value="PENDING_APPROVAL">Pending</option>
                        <option value="ACTIVE">Active</option>
                        <option value="REJECTED">Rejected</option>
                        <option value="REMOVED">Removed</option>
                    </select>
                    <button type="submit">Set</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p class="meta" th:if="${page.totalPages > 1}">
        <a th:if="${page.hasPrevious()}"
           th:href="@{/admin/products(page=${page.number - 1},size=${page.size})}">Previous</a>
        <span th:text="'Page ' + (${page.number} + 1) + '/' + ${page.totalPages}"></span>
        <a th:if="${page.hasNext()}"
           th:href="@{/admin/products(page=${page.number + 1},size=${page.size})}">Next</a>
    </p>
    <p><a th:href="@{/admin}">← Dashboard</a></p>
</main>
</body>
</html>
