<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div th:replace="~{fragments :: flash}"></div>
    <h1>Users</h1>
    <table class="data">
        <thead>
        <tr>
            <th>Email</th>
            <th>Roles</th>
            <th>Enabled</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.email}"></td>
            <td th:text="${u.roles}"></td>
            <td th:text="${u.enabled}"></td>
            <td>
                <form th:if="${!u.roles.contains(T(com.marketplace.domain.Role).ADMIN)}"
                      class="inline-form" th:action="@{/admin/users/{id}/enabled(id=${u.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="enabled" th:value="${!u.enabled}"/>
                    <button type="submit" th:text="${u.enabled} ? 'Disable' : 'Enable'"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p><a th:href="@{/admin}">← Dashboard</a></p>
</main>
</body>
</html>
