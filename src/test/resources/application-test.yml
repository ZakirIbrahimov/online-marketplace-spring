spring:
  datasource:
    url: jdbc:sqlite:${java.io.tmpdir}/marketplace-test.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: PRAGMA foreign_keys = ON
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    enabled: true
    locations: classpath:db/migration/sqlite

marketplace:
  upload-dir: ${java.io.tmpdir}/marketplace-test-uploads
